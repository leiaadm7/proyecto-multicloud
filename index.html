<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudPulse Tech - Solicitar Acceso</title>
    <style>
        :root {
            --pink-pastel: #fff0f5;
            --pink-accent: #ffb6c1;
            --pink-dark: #ff69b4;
            --text-dark: #4a4a4a;
            --surface-white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--pink-pastel);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--surface-white);
            border: 2px solid var(--pink-accent);
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 8px 24px rgba(255, 182, 193, 0.4);
            padding: 30px 25px;
        }

        h1 {
            color: var(--pink-dark);
            font-size: 1.6rem;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: var(--text-dark);
            font-size: 0.95rem;
            margin-bottom: 25px;
            text-align: center;
            line-height: 1.4;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: var(--text-dark);
            margin-bottom: 8px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            background-color: #fffafb;
            border: 1px solid var(--pink-accent);
            border-radius: 6px;
            padding: 12px;
            color: var(--text-dark);
            font-size: 1rem;
            transition: all 0.3s;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--pink-dark);
            box-shadow: 0 0 8px rgba(255, 105, 180, 0.2);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .submit-btn {
            width: 100%;
            background-color: var(--pink-accent);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 14px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: background-color 0.3s, transform 0.1s;
            box-shadow: 0 4px 12px rgba(255, 182, 193, 0.3);
        }

        .submit-btn:hover {
            background-color: var(--pink-dark);
        }

        .submit-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>CloudPulse Tech</h1>
        <p class="subtitle">Ingresa tus datos para solicitar acceso a la plataforma de monitoreo.</p>
        
        <form id="contactForm">
            <div class="form-group">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" required placeholder="Tu nombre">
            </div>
            
            <div class="form-group">
                <label for="correo">Correo Electrónico</label>
                <input type="email" id="correo" required placeholder="tu@correo.com">
            </div>
            
            <div class="form-group">
                <label for="mensaje">Mensaje / Justificación</label>
                <textarea id="mensaje" required placeholder="Cuéntanos por qué necesitas acceso..."></textarea>
            </div>
            
            <button type="submit" class="submit-btn">Solicitar Acceso</button>
        </form>
    </div>

    <script>
    document.getElementById('contactForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const nombre = document.getElementById('nombre').value.trim();
        const correo = document.getElementById('correo').value.trim();
        const mensaje = document.getElementById('mensaje').value.trim();

        const datos = {
            nombre: nombre,
            correo: correo,
            mensaje: mensaje
        };

        fetch('https://api-cloudpulse.onrender.com/api/registrar', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(datos)
        })
        .then(response => response.json())
        .then(data => {
            if(data.status === "exito") {
                alert("¡Solicitud enviada con éxito! Tus datos se guardaron en la base de datos multicloud.");
                document.getElementById('contactForm').reset();
            } else {
                alert("Hubo un problema en el servidor al intentar guardar.");
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert("No se pudo conectar con el backend de Render.");
        });
    });
    </script>

</body>
</html>
