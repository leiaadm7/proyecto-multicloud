<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudPulse - Consola de Monitoreo Premium</title>
    <style>
        :root {
            --bg-principal: #fff1f2; 
            --bg-tarjeta: #ffffff;    
            --borde: #ffe4e6;        
            --rosa-destacado: #db2777;
            --rosa-medio: #f472b6;     
            --texto-principal: #3f3f46;
            --texto-secundario: #71717a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-principal); color: var(--texto-principal); padding: 40px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { text-align: center; margin-bottom: 50px; max-width: 600px; }
        header h1 { color: var(--rosa-destacado); font-size: 2.6rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 12px; }
        header p { color: var(--texto-secundario); font-size: 1.1rem; font-weight: 500; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; max-width: 1000px; width: 100%; margin-bottom: 50px; }
        .card { background: var(--bg-tarjeta); border: 1px solid var(--borde); padding: 25px; border-radius: 16px; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(219, 39, 119, 0.04); }
        .card:hover { transform: translateY(-4px); border-color: var(--rosa-medio); box-shadow: 0 10px 25px rgba(219, 39, 119, 0.08); }
        .card h3 { color: var(--texto-secundario); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; }
        .metric { font-size: 2.4rem; font-weight: 700; color: var(--rosa-destacado); }
        .container-form { background: var(--bg-tarjeta); border: 1px solid var(--borde); padding: 40px; border-radius: 20px; max-width: 550px; width: 100%; box-shadow: 0 10px 30px rgba(219, 39, 119, 0.05); }
        .container-form h2 { margin-bottom: 25px; font-size: 1.5rem; font-weight: 700; color: var(--texto-principal); border-left: 4px solid var(--rosa-destacado); padding-left: 12px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--texto-secundario); font-size: 0.9rem; font-weight: 600; }
        input, textarea { width: 100%; padding: 12px 16px; background: #ffffff; border: 1px solid var(--borde); border-radius: 10px; color: var(--texto-principal); font-size: 0.95rem; transition: all 0.2s; }
        input:focus, textarea:focus { border-color: var(--rosa-destacado); outline: none; box-shadow: 0 0 0 3px rgba(219, 39, 119, 0.1); }
        button { width: 100%; padding: 14px; background: var(--rosa-destacado); border: none; border-radius: 10px; color: white; font-weight: 700; cursor: pointer; font-size: 1rem; transition: all 0.2s; margin-top: 10px; }
        button:hover { background: #be185d; transform: scale(1.01); }
    </style>
</head>
<body>

    <header>
        <h1>CloudPulse Tech</h1>
        <p>Consola de Monitoreo e Infraestructura Multicloud Desacoplada</p>
    </header>

    <div class="grid">
        <div class="card">
            <h3>Carga de CPU</h3>
            <div class="metric">28.4%</div>
        </div>
        <div class="card">
            <h3>Latencia de Red</h3>
            <div class="metric">12 ms</div>
        </div>
        <div class="card">
            <h3>Servicios Activos</h3>
            <div class="metric">36 / 36</div>
        </div>
    </div>

    <div class="container-form">
        <h2>Registro de Acceso a la Beta</h2>
        <form id="contactForm">
            <div class="form-group">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" placeholder="Ej. Tu Nombre" required>
            </div>
            <div class="form-group">
                <label for="correo">Correo Electrónico</label>
                <input type="email" id="correo" placeholder="ejemplo@inacapmail.cl" required>
            </div>
            <div class="form-group">
                <label for="mensaje">Breve Descripción del Caso de Uso</label>
                <textarea id="mensaje" rows="4" placeholder="¿Para qué vas a usar la consola?" required></textarea>
            </div>
            <button type="submit">Solicitar Acceso</button>
        </form>
    </div>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const nombre = document.getElementById('nombre').value.trim();
            const correo = document.getElementById('correo').value.trim();
            const mensaje = document.getElementById('mensaje').value.trim();

            console.log("=== [INFO] VALIDACIÓN LOCAL EXITOSA ===");
            console.log("-> Nombre:", nombre);
            console.log("-> Correo:", correo);
            console.log("-> Mensaje:", mensaje);
            console.log("=======================================");

            alert("¡Validación exitosa! Tu consola está lista para conectar la API en la próxima actividad.");
            this.reset();
        });
    </script>
</body>
</html>
